<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Generator Website By Aryan Bhavsar</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <p>Enter Your Text Or URL</p>
        <input type="text" placeholder="Text Or URL" id="qrText">

        <div id="imgbox">
            <img src="" id="qrImage">
        </div>

        <button onclick="generateqr()">Generate QR Code</button>
        <button onclick="downloadQR()">Download QR Code</button>
    </div>

    <script>
        let imgbox = document.getElementById("imgbox");
        let qrImage = document.getElementById("qrImage");
        let qrText = document.getElementById("qrText");

        function generateqr(){

            if(qrText.value.length > 0){
                let data = encodeURIComponent(qrText.value);
                qrImage.src = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + data;
                imgbox.classList.add("show-img") 
            }
            else{
                qrText.classList.add('error');
                setTimeout(()=>{
                    qrText.classList.remove('error');
                },1000)
            }
        }

        function downloadQR(){
            if(imgbox.classList.contains("show-img")){
                 window.open(qrImage.src, "_blank");
            }
             else{
            alert("Generate QR code first!");
            }
    }
    </script>

</body>
</html>
